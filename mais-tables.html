<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Tabela</title>
    <style>
        table, th, td {
            border: 3px solid black;
            border-collapse: collapse;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table cellspacing="0">
        <caption>Lista dos Times do Rio de Janeiro</caption>
        <thead>
            <tr>
                <th>Posição</th>
                <th>Time</th>
                <th>Estadio</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Flamengo</td>
                <td>Maracana</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Vasco</td>
                <td>São Januário</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Fluminense</td>
                <td>Maracana</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Botafogo</td>
                <td>Nilton Santos</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Fonte: Wikipedia</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
